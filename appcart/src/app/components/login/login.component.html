<div id="login-card">
  <p>Login page</p>
  <input type="text" [(ngModel)]="username" placeholder="Username" />
  <input type="password" [(ngModel)]="password" placeholder="Password" (keyup.enter)="onLogin()" />
  @if (error) {
    <p class="error-msg">{{ error }}</p>
  }
  <button (click)="onLogin()">Login</button>
</div>
